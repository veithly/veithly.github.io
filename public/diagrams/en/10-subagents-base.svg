<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="100%" font-family="'Kalam','Comic Neue',sans-serif">
  <defs>
    <filter id="r10">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="20" />
      <feDisplacementMap in="SourceGraphic" scale="1.3" />
    </filter>
    <style>
      .t { font-size: 14px; fill: #0f172a; }
      .t-sm { font-size: 12px; fill: #0f172a; }
      .t-sub { font-size: 12px; fill: #334155; }
      .head { font-size: 18px; fill: #0f172a; font-weight: 700; }
    </style>
  </defs>

  <rect width="900" height="580" fill="#fbfaf7" />

  <text x="450" y="34" class="head" text-anchor="middle">Subagent: four abstraction levels for child agents</text>
  <text x="450" y="54" class="t-sub" text-anchor="middle">function &#x2192; typed enum &#x2192; task abstraction &#x2192; full platform</text>

  <g filter="url(#r10)">
    <rect x="20" y="68" width="430" height="240" rx="12" fill="#fbfaf7" stroke="#1d4ed8" stroke-width="2.5" />
    <text x="40" y="92" class="t" fill="#1d4ed8" font-weight="700">Codex &#x00B7; SubAgentSource enum</text>
    <text x="40" y="110" class="t-sub">5 sources + service inheritance</text>

    <rect x="40" y="124" width="180" height="80" rx="6" fill="#fbfaf7" stroke="#0f172a" stroke-width="1.5" />
    <text x="130" y="142" class="t" text-anchor="middle">5 sources</text>
    <text x="130" y="158" class="t-sub" text-anchor="middle">Review</text>
    <text x="130" y="172" class="t-sub" text-anchor="middle">Compact</text>
    <text x="130" y="186" class="t-sub" text-anchor="middle">ThreadSpawn{depth}</text>
    <text x="130" y="200" class="t-sub" text-anchor="middle">MemoryConsolidation / Other</text>

    <rect x="240" y="124" width="190" height="80" rx="6" fill="#fbfaf7" stroke="#0f172a" stroke-width="1.5" />
    <text x="335" y="142" class="t" text-anchor="middle">7 service categories inherited</text>
    <text x="335" y="158" class="t-sub" text-anchor="middle">exec_policy &#x00B7; plugins</text>
    <text x="335" y="172" class="t-sub" text-anchor="middle">mcp &#x00B7; skills &#x00B7; env</text>
    <text x="335" y="186" class="t-sub" text-anchor="middle">auth &#x00B7; models</text>
    <text x="335" y="200" class="t-sub" text-anchor="middle">child cannot be looser than parent</text>

    <rect x="40" y="216" width="390" height="80" rx="6" fill="#fbfaf7" stroke="#b91c1c" stroke-width="2" />
    <text x="235" y="234" class="t" text-anchor="middle" fill="#b91c1c" font-weight="700">approval routed back to parent</text>
    <text x="235" y="252" class="t-sub" text-anchor="middle">child agent AskForApproval = Never</text>
    <text x="235" y="266" class="t-sub" text-anchor="middle">events pushed to parent session</text>
    <text x="235" y="280" class="t-sub" text-anchor="middle">child never pops UI</text>

    <rect x="470" y="68" width="410" height="240" rx="12" fill="#fbfaf7" stroke="#6d28d9" stroke-width="2.5" />
    <text x="490" y="92" class="t" fill="#6d28d9" font-weight="700">Claude Code &#x00B7; Task abstraction</text>
    <text x="490" y="110" class="t-sub">7 TaskTypes + status FSM</text>

    <rect x="490" y="124" width="180" height="80" rx="6" fill="#fbfaf7" stroke="#0f172a" stroke-width="1.5" />
    <text x="580" y="142" class="t" text-anchor="middle">TaskType x7</text>
    <text x="580" y="158" class="t-sub" text-anchor="middle">local_bash / local_agent</text>
    <text x="580" y="172" class="t-sub" text-anchor="middle">remote_agent / teammate</text>
    <text x="580" y="186" class="t-sub" text-anchor="middle">local_workflow / monitor_mcp</text>
    <text x="580" y="200" class="t-sub" text-anchor="middle">dream</text>

    <rect x="690" y="124" width="180" height="80" rx="6" fill="#fbfaf7" stroke="#0f172a" stroke-width="1.5" />
    <text x="780" y="142" class="t" text-anchor="middle">TaskStatus FSM</text>
    <text x="780" y="158" class="t-sub" text-anchor="middle">pending &#x2192; running</text>
    <text x="780" y="172" class="t-sub" text-anchor="middle">&#x2192; completed/failed/killed</text>
    <text x="780" y="186" class="t-sub" text-anchor="middle">outputFile persisted</text>
    <text x="780" y="200" class="t-sub" text-anchor="middle">isConcurrencySafe()</text>

    <rect x="490" y="216" width="380" height="80" rx="6" fill="#fbfaf7" stroke="#0f172a" stroke-width="1.5" />
    <text x="680" y="234" class="t" text-anchor="middle">5-piece task tool set</text>
    <text x="680" y="250" class="t-sub" text-anchor="middle">TaskCreate &#x00B7; TaskList &#x00B7; TaskUpdate</text>
    <text x="680" y="264" class="t-sub" text-anchor="middle">TaskGet &#x00B7; TaskStop</text>
    <text x="680" y="278" class="t-sub" text-anchor="middle">model actively manages task list</text>

    <rect x="20" y="320" width="430" height="240" rx="12" fill="#fbfaf7" stroke="#15803d" stroke-width="2.5" />
    <text x="40" y="344" class="t" fill="#15803d" font-weight="700">OpenClaw &#x00B7; subagent platform</text>
    <text x="40" y="362" class="t-sub">spawn / registry / depth / announce / attachments / lifecycle</text>

    <rect x="40" y="376" width="180" height="80" rx="6" fill="#fbfaf7" stroke="#0f172a" stroke-width="1.5" />
    <text x="130" y="394" class="t" text-anchor="middle">13-field spawn</text>
    <text x="130" y="410" class="t-sub" text-anchor="middle">task / label / agentId</text>
    <text x="130" y="424" class="t-sub" text-anchor="middle">model / mode / sandbox</text>
    <text x="130" y="438" class="t-sub" text-anchor="middle">cleanup / attachments</text>
    <text x="130" y="452" class="t-sub" text-anchor="middle">thread / timeout / ...</text>

    <rect x="240" y="376" width="190" height="80" rx="6" fill="#fbfaf7" stroke="#b91c1c" stroke-width="2" />
    <text x="335" y="394" class="t" text-anchor="middle" fill="#b91c1c" font-weight="700">push-based + anti-polling</text>
    <text x="335" y="412" class="t-sub" text-anchor="middle">SPAWN_ACCEPTED_NOTE</text>
    <text x="335" y="426" class="t-sub" text-anchor="middle">included in tool return value</text>
    <text x="335" y="440" class="t-sub" text-anchor="middle">"do NOT poll"</text>

    <rect x="40" y="468" width="390" height="80" rx="6" fill="#fbfaf7" stroke="#0f172a" stroke-width="1.5" />
    <text x="235" y="486" class="t" text-anchor="middle">spawnDepth persisted</text>
    <text x="235" y="504" class="t-sub" text-anchor="middle">kept in session store across processes</text>
    <text x="235" y="518" class="t-sub" text-anchor="middle">DEFAULT_SUBAGENT_MAX_SPAWN_DEPTH is configurable</text>
    <text x="235" y="532" class="t-sub" text-anchor="middle">subagent-announce push events</text>

    <rect x="470" y="320" width="410" height="240" rx="12" fill="#fbfaf7" stroke="#ea580c" stroke-width="2.5" />
    <text x="490" y="344" class="t" fill="#ea580c" font-weight="700">Hermes &#x00B7; delegate_task</text>
    <text x="490" y="362" class="t-sub">functional + MAX_DEPTH=2 + 5 tools hard-banned</text>

    <rect x="490" y="376" width="180" height="80" rx="6" fill="#fbfaf7" stroke="#0f172a" stroke-width="1.5" />
    <text x="580" y="394" class="t" text-anchor="middle">delegate_task()</text>
    <text x="580" y="410" class="t-sub" text-anchor="middle">goal / context</text>
    <text x="580" y="424" class="t-sub" text-anchor="middle">toolset / max_iter</text>
    <text x="580" y="438" class="t-sub" text-anchor="middle">3 concurrent by default</text>
    <text x="580" y="452" class="t-sub" text-anchor="middle">parent blocks until all done</text>

    <rect x="690" y="376" width="180" height="80" rx="6" fill="#fbfaf7" stroke="#b91c1c" stroke-width="2" />
    <text x="780" y="394" class="t" text-anchor="middle" fill="#b91c1c" font-weight="700">5 hard-banned tools</text>
    <text x="780" y="408" class="t-sub" text-anchor="middle">delegate_task</text>
    <text x="780" y="420" class="t-sub" text-anchor="middle">clarify</text>
    <text x="780" y="432" class="t-sub" text-anchor="middle">memory</text>
    <text x="780" y="444" class="t-sub" text-anchor="middle">send_message</text>
    <text x="780" y="456" class="t-sub" text-anchor="middle">execute_code</text>

    <rect x="490" y="468" width="380" height="80" rx="6" fill="#fbfaf7" stroke="#0f172a" stroke-width="1.5" />
    <text x="680" y="486" class="t" text-anchor="middle">MAX_DEPTH = 2 hard-coded</text>
    <text x="680" y="504" class="t-sub" text-anchor="middle">parent(0) &#x2192; child(1) &#x2192; grandchild rejected</text>
    <text x="680" y="518" class="t-sub" text-anchor="middle">ThreadPoolExecutor for sync concurrency</text>
    <text x="680" y="532" class="t-sub" text-anchor="middle">30s heartbeat to keep UI alive</text>
  </g>
</svg>
