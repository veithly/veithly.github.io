<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" role="img"
     aria-label="Four memory stacks side by side">
  <defs>
    <filter id="wb16F"><feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="167" /><feDisplacementMap in="SourceGraphic" scale="1.5" /></filter>
    <marker id="ar16F" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0f172a" /></marker>
    <style>
      .h    { font: 600 14px sans-serif; fill: #0f172a; }
      .col  { font: 700 13px sans-serif; fill: #0f172a; }
      .lbl  { font: 700 12px sans-serif; fill: #0f172a; }
      .t-s  { font: 12px sans-serif; fill: #334155; }
      .note { font: italic 10.5px sans-serif; fill: #92400e; }
    </style>
  </defs>

  <text x="440" y="24" class="h" text-anchor="middle">Four memory stacks side by side</text>
  <text x="440" y="42" class="t-s" text-anchor="middle">AGENTS.md + background two-stage (Codex) &#x00B7; 4 MemoryTypes + drift (Claude Code) &#x00B7; qmd + decay (OpenClaw) &#x00B7; MEMORY+USER + frozen (Hermes)</text>

  <g filter="url(#wb16F)">
    <text x="120" y="70" class="col" text-anchor="middle">Codex &#x00B7; AGENTS.md + stage1/phase2</text>
    <rect x="40" y="80" width="160" height="36" rx="8" fill="#fef3c7" stroke="#0f172a" stroke-width="1.6" />
    <text x="120" y="103" class="lbl" text-anchor="middle">AGENTS.md (cwd)</text>

    <line x1="120" y1="116" x2="120" y2="135" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar16F)" />

    <rect x="40" y="138" width="160" height="48" rx="8" fill="#bfdbfe" stroke="#0f172a" stroke-width="1.6" />
    <text x="120" y="158" class="lbl" text-anchor="middle">UserInstructions injection</text>
    <text x="120" y="174" class="t-s" text-anchor="middle">role=user + INSTRUCTIONS</text>

    <line x1="120" y1="186" x2="120" y2="205" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar16F)" />

    <rect x="40" y="208" width="160" height="60" rx="8" fill="#dcfce7" stroke="#0f172a" stroke-width="1.6" />
    <text x="120" y="228" class="lbl" text-anchor="middle">stage1_outputs</text>
    <text x="120" y="244" class="t-s" text-anchor="middle">thread + cwd + git_branch</text>
    <text x="120" y="258" class="t-s" text-anchor="middle">lease + ownership_token</text>

    <line x1="120" y1="268" x2="120" y2="287" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar16F)" />

    <rect x="40" y="290" width="160" height="60" rx="8" fill="#fed7aa" stroke="#0f172a" stroke-width="1.6" />
    <text x="120" y="310" class="lbl" text-anchor="middle">phase2 global consolidate</text>
    <text x="120" y="326" class="t-s" text-anchor="middle">input_watermark increments</text>
    <text x="120" y="340" class="t-s" text-anchor="middle">6h cooldown</text>

    <line x1="120" y1="350" x2="120" y2="369" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar16F)" />

    <rect x="40" y="372" width="160" height="48" rx="8" fill="#e0e7ff" stroke="#0f172a" stroke-width="1.6" />
    <text x="120" y="392" class="lbl" text-anchor="middle">MemoryCitation</text>
    <text x="120" y="408" class="t-s" text-anchor="middle">back-references thread_id</text>

    <text x="120" y="450" class="note" text-anchor="middle">writes via background job</text>
    <text x="120" y="465" class="note" text-anchor="middle">never blocks the user</text>

    <text x="330" y="70" class="col" text-anchor="middle">Claude Code &#x00B7; 4 types + drift</text>
    <rect x="250" y="80" width="160" height="36" rx="8" fill="#fef3c7" stroke="#0f172a" stroke-width="1.6" />
    <text x="330" y="103" class="lbl" text-anchor="middle">/memory command</text>

    <line x1="330" y1="116" x2="330" y2="135" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar16F)" />

    <rect x="250" y="138" width="160" height="60" rx="8" fill="#bfdbfe" stroke="#0f172a" stroke-width="1.6" />
    <text x="330" y="158" class="lbl" text-anchor="middle">4 MemoryTypes</text>
    <text x="330" y="174" class="t-s" text-anchor="middle">user / feedback</text>
    <text x="330" y="188" class="t-s" text-anchor="middle">project / reference</text>

    <line x1="330" y1="198" x2="330" y2="217" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar16F)" />

    <rect x="250" y="220" width="160" height="48" rx="8" fill="#dcfce7" stroke="#0f172a" stroke-width="1.6" />
    <text x="330" y="240" class="lbl" text-anchor="middle">2 prompt modes</text>
    <text x="330" y="256" class="t-s" text-anchor="middle">COMBINED / INDIVIDUAL</text>

    <line x1="330" y1="268" x2="330" y2="287" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar16F)" />

    <rect x="250" y="290" width="160" height="48" rx="8" fill="#fed7aa" stroke="#0f172a" stroke-width="1.6" />
    <text x="330" y="310" class="lbl" text-anchor="middle">MEMORY_DRIFT_CAVEAT</text>
    <text x="330" y="326" class="t-s" text-anchor="middle">reminds the model to verify</text>

    <line x1="330" y1="338" x2="330" y2="357" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar16F)" />

    <rect x="250" y="360" width="160" height="60" rx="8" fill="#e0e7ff" stroke="#0f172a" stroke-width="1.6" />
    <text x="330" y="380" class="lbl" text-anchor="middle">Before recommending...</text>
    <text x="330" y="396" class="t-s" text-anchor="middle">file path &#x2192; check it exists</text>
    <text x="330" y="410" class="t-s" text-anchor="middle">function &#x2192; verify with grep</text>

    <text x="330" y="450" class="note" text-anchor="middle">eval-driven prompt design</text>

    <text x="540" y="70" class="col" text-anchor="middle">OpenClaw &#x00B7; qmd + decay</text>
    <rect x="460" y="80" width="160" height="36" rx="8" fill="#fef3c7" stroke="#0f172a" stroke-width="1.6" />
    <text x="540" y="103" class="lbl" text-anchor="middle">MEMORY.md + memory/*</text>

    <line x1="540" y1="116" x2="540" y2="135" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar16F)" />

    <rect x="460" y="138" width="160" height="48" rx="8" fill="#bfdbfe" stroke="#0f172a" stroke-width="1.6" />
    <text x="540" y="158" class="lbl" text-anchor="middle">SQLite + FTS5</text>
    <text x="540" y="174" class="t-s" text-anchor="middle">full-text index</text>

    <line x1="540" y1="186" x2="540" y2="205" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar16F)" />

    <rect x="460" y="208" width="160" height="48" rx="8" fill="#dcfce7" stroke="#0f172a" stroke-width="1.6" />
    <text x="540" y="228" class="lbl" text-anchor="middle">sqlite-vec</text>
    <text x="540" y="244" class="t-s" text-anchor="middle">embedding vectors</text>

    <line x1="540" y1="256" x2="540" y2="275" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar16F)" />

    <rect x="460" y="278" width="160" height="60" rx="8" fill="#fed7aa" stroke="#0f172a" stroke-width="1.6" />
    <text x="540" y="298" class="lbl" text-anchor="middle">hybrid + MMR + decay</text>
    <text x="540" y="314" class="t-s" text-anchor="middle">half-life: 30 days</text>
    <text x="540" y="328" class="t-s" text-anchor="middle">evergreen exception</text>

    <line x1="540" y1="338" x2="540" y2="357" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar16F)" />

    <rect x="460" y="360" width="160" height="60" rx="8" fill="#e0e7ff" stroke="#0f172a" stroke-width="1.6" />
    <text x="540" y="380" class="lbl" text-anchor="middle">qmd scope</text>
    <text x="540" y="396" class="t-s" text-anchor="middle">query &#x2192; which dirs to inject</text>
    <text x="540" y="410" class="t-s" text-anchor="middle">private / shared</text>

    <text x="540" y="450" class="note" text-anchor="middle">most complete retrieval stack</text>

    <text x="760" y="70" class="col" text-anchor="middle">Hermes &#x00B7; MEMORY + USER</text>
    <rect x="680" y="80" width="160" height="36" rx="8" fill="#fef3c7" stroke="#0f172a" stroke-width="1.6" />
    <text x="760" y="103" class="lbl" text-anchor="middle">memory tool, 4 actions</text>

    <line x1="760" y1="116" x2="760" y2="135" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar16F)" />

    <rect x="680" y="138" width="160" height="60" rx="8" fill="#bfdbfe" stroke="#0f172a" stroke-width="1.6" />
    <text x="760" y="158" class="lbl" text-anchor="middle">11 _MEMORY_THREAT</text>
    <text x="760" y="174" class="t-s" text-anchor="middle">injection scans + 10 invisible</text>
    <text x="760" y="188" class="t-s" text-anchor="middle">unicode blockers</text>

    <line x1="760" y1="198" x2="760" y2="217" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar16F)" />

    <rect x="680" y="220" width="160" height="48" rx="8" fill="#dcfce7" stroke="#0f172a" stroke-width="1.6" />
    <text x="760" y="240" class="lbl" text-anchor="middle">MEMORY.md 2200 chars</text>
    <text x="760" y="256" class="t-s" text-anchor="middle">USER.md 1375 chars</text>

    <line x1="760" y1="268" x2="760" y2="287" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar16F)" />

    <rect x="680" y="290" width="160" height="60" rx="8" fill="#fed7aa" stroke="#0f172a" stroke-width="1.6" />
    <text x="760" y="310" class="lbl" text-anchor="middle">frozen snapshot</text>
    <text x="760" y="326" class="t-s" text-anchor="middle">mid-session writes go to disk only</text>
    <text x="760" y="340" class="t-s" text-anchor="middle">prefix cache stays warm</text>

    <line x1="760" y1="350" x2="760" y2="369" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar16F)" />

    <rect x="680" y="372" width="160" height="48" rx="8" fill="#e0e7ff" stroke="#0f172a" stroke-width="1.6" />
    <text x="760" y="392" class="lbl" text-anchor="middle">_file_lock</text>
    <text x="760" y="408" class="t-s" text-anchor="middle">fcntl / msvcrt, cross-platform</text>

    <text x="760" y="450" class="note" text-anchor="middle">most restrained</text>
  </g>

  <text x="440" y="490" class="t-s" text-anchor="middle">Letting an agent remember things: four stances for four scenarios.</text>

  <g>
    <rect x="40" y="505" width="800" height="95" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
    <text x="60" y="525" class="lbl">Shared traits:</text>
    <text x="60" y="543" class="t-s">&#x00B7; Short-term memory rides on per-turn data structures (rollout / sessionStorage / session-files / MessageHistory).</text>
    <text x="60" y="559" class="t-s">&#x00B7; Long-term memory must say whether a write is persisted or merely injected (snapshot vs runtime assembly).</text>
    <text x="60" y="575" class="t-s">&#x00B7; Input scanning + drift handling are non-negotiable in production (Hermes scans code; Claude Code does it via prompt reminders).</text>
    <text x="60" y="591" class="t-s">&#x00B7; All ship a / command as a manual entry (/memory add / list / clear).</text>
  </g>
</svg>
