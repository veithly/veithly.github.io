<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img"
     aria-label="Three angles on error recovery">
  <defs>
    <filter id="wb02"><feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="221" /><feDisplacementMap in="SourceGraphic" scale="1.5" /></filter>
    <marker id="ar02" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0f172a" /></marker>
    <style>
      .h    { font: 600 14px sans-serif; fill: #0f172a; }
      .col  { font: 700 13px sans-serif; fill: #0f172a; }
      .lbl  { font: 700 12px sans-serif; fill: #0f172a; }
      .t    { font: 12px sans-serif; fill: #334155; }
      .t-s  { font: 12px sans-serif; fill: #334155; }
      .note { font: italic 10.5px sans-serif; fill: #92400e; }
      .num  { font: 700 12.5px sans-serif; fill: #fff; }
    </style>
  </defs>
  <text x="360" y="26" class="h" text-anchor="middle">Three angles on error recovery</text>
  <text x="360" y="44" class="t-s" text-anchor="middle">Same turn, cross-session, user-initiated interrupt &#x2014; three classes need different handling</text>

  <g filter="url(#wb02)">
    <rect x="60" y="70" width="600" height="64" rx="10" fill="#fef3c7" stroke="#0f172a" stroke-width="1.6" />
    <circle cx="92" cy="102" r="16" fill="#0f172a" />
    <text x="92" y="107" class="num" text-anchor="middle">1</text>
    <text x="120" y="93" class="lbl">What if it fails within the same turn?</text>
    <text x="120" y="112" class="t">throw immediately vs inject error and let the model self-correct vs step back, compress, retry</text>
    <text x="120" y="127" class="t-s">Claude Code: error becomes a transition.reason; Codex does plain backoff retry</text>

    <rect x="60" y="144" width="600" height="64" rx="10" fill="#bfdbfe" stroke="#0f172a" stroke-width="1.6" />
    <circle cx="92" cy="176" r="16" fill="#0f172a" />
    <text x="92" y="181" class="num" text-anchor="middle">2</text>
    <text x="120" y="167" class="lbl">Can the session resume after interrupt / crash?</text>
    <text x="120" y="186" class="t">rollout replay / session persistence / fully stateless</text>
    <text x="120" y="201" class="t-s">Codex JSONL event stream is most complete; Hermes uses checkpoint soft rollback</text>

    <rect x="60" y="218" width="600" height="64" rx="10" fill="#fee2e2" stroke="#0f172a" stroke-width="1.6" />
    <circle cx="92" cy="250" r="16" fill="#0f172a" />
    <text x="92" y="255" class="num" text-anchor="middle">3</text>
    <text x="120" y="241" class="lbl">How are user-initiated interrupts handled?</text>
    <text x="120" y="260" class="t">forget / checkpoint / inject &#x201C;you were interrupted&#x201D;</text>
    <text x="120" y="275" class="t-s">AbortController vs interrupt RPC vs _interrupt_requested flag</text>
  </g>
</svg>
