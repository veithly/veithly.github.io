<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 480" role="img"
     aria-label="Four cron systems plotted across local vs cloud capability">
  <defs>
    <filter id="wb18"><feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="181" /><feDisplacementMap in="SourceGraphic" scale="2" /></filter>
    <marker id="ar18" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0f172a" /></marker>
    <style>
      .h    { font: 600 14px sans-serif; fill: #0f172a; }
      .ax   { font: 600 12.5px sans-serif; fill: #0f172a; }
      .t    { font: 12px sans-serif; fill: #334155; }
      .t-s  { font: 12px sans-serif; fill: #64748b; }
      .pin  { font: 700 12.5px sans-serif; fill: #fff; }
      .note { font: italic 10.5px sans-serif; fill: #334155; }
    </style>
  </defs>

  <text x="390" y="26" class="h" text-anchor="middle">Cron systems: local capability &#x00D7; cloud capability</text>
  <text x="390" y="44" class="t-s" text-anchor="middle">Right = stronger cloud; up = more complete local. Local wins offline; cloud wins for large jobs.</text>

  <g filter="url(#wb18)">
    <rect x="100" y="80" width="280" height="160" fill="#fef3c7" opacity="0.4" />
    <rect x="380" y="80" width="280" height="160" fill="#dcfce7" opacity="0.4" />
    <rect x="100" y="240" width="280" height="160" fill="#dbeafe" opacity="0.4" />
    <rect x="380" y="240" width="280" height="160" fill="#fee2e2" opacity="0.4" />

    <text x="120" y="100" class="t-s">strong local &#x00B7; weak cloud</text>
    <text x="640" y="100" class="t-s" text-anchor="end">strong local &#x00B7; strong cloud</text>
    <text x="110" y="394" class="t-s">weak local &#x00B7; weak cloud</text>
    <text x="650" y="394" class="t-s" text-anchor="end">weak local &#x00B7; strong cloud</text>

    <line x1="100" y1="400" x2="660" y2="400" stroke="#0f172a" stroke-width="2.5" marker-end="url(#ar18)" />
    <line x1="100" y1="400" x2="100" y2="70" stroke="#0f172a" stroke-width="2.5" marker-end="url(#ar18)" />
    <line x1="380" y1="80" x2="380" y2="400" stroke="#0f172a" stroke-width="1" stroke-dasharray="3 3" />
    <line x1="100" y1="240" x2="660" y2="240" stroke="#0f172a" stroke-width="1" stroke-dasharray="3 3" />

    <text x="660" y="420" class="ax" text-anchor="end">cloud capability &#x2192;</text>
    <text x="110" y="68" class="ax">&#x2191; local cron completeness</text>

    <circle cx="160" cy="130" r="14" fill="#15803d" stroke="#0f172a" stroke-width="2" />
    <text x="160" y="134" class="pin" text-anchor="middle">OC</text>
    <text x="160" y="161" class="t" text-anchor="middle">OpenClaw</text>
    <text x="160" y="176" class="t-s" text-anchor="middle">textbook-grade cron</text>
    <text x="160" y="189" class="t-s" text-anchor="middle">+ delivery + failure handling</text>

    <circle cx="320" cy="160" r="14" fill="#6d28d9" stroke="#0f172a" stroke-width="2" />
    <text x="320" y="164" class="pin" text-anchor="middle">CC</text>
    <text x="320" y="191" class="t" text-anchor="middle">Claude Code</text>
    <text x="320" y="206" class="t-s" text-anchor="middle">1s tick + chokidar</text>
    <text x="320" y="219" class="t-s" text-anchor="middle">scheduler lock</text>

    <circle cx="280" cy="270" r="14" fill="#ea580c" stroke="#0f172a" stroke-width="2" />
    <text x="280" y="274" class="pin" text-anchor="middle">HM</text>
    <text x="280" y="301" class="t" text-anchor="middle">Hermes</text>
    <text x="280" y="316" class="t-s" text-anchor="middle">croniter + jobs.json</text>
    <text x="280" y="329" class="t-s" text-anchor="middle">+ 10-rule threat scan</text>

    <circle cx="600" cy="320" r="14" fill="#1d4ed8" stroke="#0f172a" stroke-width="2" />
    <text x="600" y="324" class="pin" text-anchor="middle">CX</text>
    <text x="600" y="351" class="t" text-anchor="middle">Codex</text>
    <text x="600" y="366" class="t-s" text-anchor="middle">cloud-tasks standalone binary</text>
    <text x="600" y="379" class="t-s" text-anchor="middle">bestOf parallelism</text>
  </g>

  <text x="20" y="465" class="t-s">CX = Codex &#x00B7; CC = Claude Code &#x00B7; OC = OpenClaw &#x00B7; HM = Hermes</text>
</svg>
