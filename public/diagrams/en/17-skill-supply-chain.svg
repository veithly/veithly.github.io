  <text x="440" y="490" class="t-s" text-anchor="middle">Distilling experience into skills: four stances for four scenarios.</text>

  <g>
    <rect x="40" y="505" width="800" height="90" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
    <text x="60" y="525" class="lbl">Shared traits:</text>
    <text x="60" y="543" class="t-s">&#x00B7; SKILL.md frontmatter is the de-facto standard (agentskills.io).</text>
    <text x="60" y="559" class="t-s">&#x00B7; All practice progressive disclosure (metadata first, body lazy).</text>
    <text x="60" y="575" class="t-s">&#x00B7; All keep allowed-tools narrow (Bash cannot stay wide open).</text>
    <text x="60" y="589" class="t-s">&#x00B7; All differentiate trust by source (Hermes most explicit; OpenClaw routes through the scanner).</text>
  </g>
