  <text x="440" y="24" class="h" text-anchor="middle">Four skill supply chains side by side</text>
  <text x="440" y="42" class="t-s" text-anchor="middle">8 crates + Policy (Codex) &#x00B7; skillify wizard (Claude Code) &#x00B7; scanner + install (OpenClaw) &#x00B7; 12-cell trust matrix (Hermes)</text>

  <g filter="url(#wb17F)">
