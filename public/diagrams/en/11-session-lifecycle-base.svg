<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="100%" font-family="'Kalam','Comic Neue',sans-serif">
  <defs>
    <filter id="r11">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="21" />
      <feDisplacementMap in="SourceGraphic" scale="1.3" />
    </filter>
    <style>
      .t { font-size: 14px; fill: #0f172a; }
      .t-sm { font-size: 12px; fill: #0f172a; }
      .t-sub { font-size: 12px; fill: #334155; }
      .head { font-size: 18px; fill: #0f172a; font-weight: 700; }
    </style>
  </defs>

  <rect width="900" height="580" fill="#fbfaf7" />

  <text x="450" y="34" class="head" text-anchor="middle">Session lifecycle: from file persistence to multi-platform routing</text>
  <text x="450" y="54" class="t-sub" text-anchor="middle">JSONL+SQLite &#x00B7; 4 hooks+22 tools &#x00B7; minimal id &#x00B7; multi-platform + 4 reset modes</text>

  <g filter="url(#r11)">
    <rect x="20" y="68" width="430" height="240" rx="12" fill="#fbfaf7" stroke="#1d4ed8" stroke-width="2.5" />
    <text x="40" y="92" class="t" fill="#1d4ed8" font-weight="700">Codex &#x00B7; JSONL + SQLite</text>
    <text x="40" y="110" class="t-sub">rollout-{ts}-{uuid}.jsonl + state.db</text>

    <rect x="40" y="124" width="180" height="80" rx="6" fill="#fbfaf7" stroke="#0f172a" stroke-width="1.5" />
    <text x="130" y="142" class="t" text-anchor="middle">5 RolloutItem variants</text>
    <text x="130" y="158" class="t-sub" text-anchor="middle">SessionMeta</text>
    <text x="130" y="172" class="t-sub" text-anchor="middle">ResponseItem</text>
    <text x="130" y="186" class="t-sub" text-anchor="middle">Compacted</text>
    <text x="130" y="200" class="t-sub" text-anchor="middle">TurnContext / EventMsg</text>

    <rect x="240" y="124" width="190" height="80" rx="6" fill="#fbfaf7" stroke="#0f172a" stroke-width="1.5" />
    <text x="335" y="142" class="t" text-anchor="middle">SessionMeta fields</text>
    <text x="335" y="158" class="t-sub" text-anchor="middle">cwd / model / agent</text>
    <text x="335" y="172" class="t-sub" text-anchor="middle">git_sha / cli_version</text>
    <text x="335" y="186" class="t-sub" text-anchor="middle">timestamp / source</text>
    <text x="335" y="200" class="t-sub" text-anchor="middle">approval_mode / sandbox</text>

    <rect x="40" y="216" width="390" height="80" rx="6" fill="#fbfaf7" stroke="#b91c1c" stroke-width="2" />
    <text x="235" y="234" class="t" text-anchor="middle" fill="#b91c1c" font-weight="700">at most 1 turn at a time</text>
    <text x="235" y="252" class="t-sub" text-anchor="middle">Mutex&lt;SessionState&gt; + Mutex&lt;active_turn&gt;</text>
    <text x="235" y="266" class="t-sub" text-anchor="middle">Mailbox accepts out-of-band input</text>
    <text x="235" y="280" class="t-sub" text-anchor="middle">ThreadId &#x2260; SessionId</text>

    <rect x="470" y="68" width="410" height="240" rx="12" fill="#fbfaf7" stroke="#6d28d9" stroke-width="2.5" />
    <text x="490" y="92" class="t" fill="#6d28d9" font-weight="700">Claude Code &#x00B7; 4 hooks + 22 tools</text>
    <text x="490" y="110" class="t-sub">startup / resume / clear / compact</text>

    <rect x="490" y="124" width="180" height="80" rx="6" fill="#fbfaf7" stroke="#b91c1c" stroke-width="2" />
    <text x="580" y="142" class="t" text-anchor="middle" fill="#b91c1c" font-weight="700">4 source hooks</text>
    <text x="580" y="158" class="t-sub" text-anchor="middle">startup &#x2192; inject CLAUDE.md</text>
    <text x="580" y="172" class="t-sub" text-anchor="middle">resume &#x2192; rebuild watcher</text>
    <text x="580" y="186" class="t-sub" text-anchor="middle">clear &#x2192; clear state</text>
    <text x="580" y="200" class="t-sub" text-anchor="middle">compact &#x2192; snapshot</text>

    <rect x="690" y="124" width="180" height="80" rx="6" fill="#fbfaf7" stroke="#0f172a" stroke-width="1.5" />
    <text x="780" y="142" class="t" text-anchor="middle">22 session tools</text>
    <text x="780" y="158" class="t-sub" text-anchor="middle">Start / Restore / Storage</text>
    <text x="780" y="172" class="t-sub" text-anchor="middle">Memory / Compact / Activity</text>
    <text x="780" y="186" class="t-sub" text-anchor="middle">EnvVars / Tracing / Hooks</text>
    <text x="780" y="200" class="t-sub" text-anchor="middle">WebSocket / Ingress / ...</text>

    <rect x="490" y="216" width="380" height="80" rx="6" fill="#fbfaf7" stroke="#0f172a" stroke-width="1.5" />
    <text x="680" y="234" class="t" text-anchor="middle">resume crosses 7 subsystems</text>
    <text x="680" y="250" class="t-sub" text-anchor="middle">cost / attribution / fileHistory</text>
    <text x="680" y="264" class="t-sub" text-anchor="middle">todos / model / worktree / systemPrompt</text>
    <text x="680" y="278" class="t-sub" text-anchor="middle">"do not add ANY warmup"</text>

    <rect x="20" y="320" width="430" height="240" rx="12" fill="#fbfaf7" stroke="#15803d" stroke-width="2.5" />
    <text x="40" y="344" class="t" fill="#15803d" font-weight="700">OpenClaw &#x00B7; minimal session-id</text>
    <text x="40" y="362" class="t-sub">upper-layer caller decides persistence</text>

    <rect x="40" y="376" width="180" height="80" rx="6" fill="#fbfaf7" stroke="#0f172a" stroke-width="1.5" />
    <text x="130" y="394" class="t" text-anchor="middle">UUID regex</text>
    <text x="130" y="414" class="t-sub" text-anchor="middle">SESSION_ID_RE</text>
    <text x="130" y="428" class="t-sub" text-anchor="middle">looksLikeSessionId()</text>
    <text x="130" y="442" class="t-sub" text-anchor="middle">one line of code</text>

    <rect x="240" y="376" width="190" height="80" rx="6" fill="#fbfaf7" stroke="#0f172a" stroke-width="1.5" />
    <text x="335" y="394" class="t" text-anchor="middle">session-key-utils</text>
    <text x="335" y="410" class="t-sub" text-anchor="middle">{agentId}:{sessionId}</text>
    <text x="335" y="424" class="t-sub" text-anchor="middle">agent-scope isolation</text>
    <text x="335" y="438" class="t-sub" text-anchor="middle">default-agent / sub-agent</text>

    <rect x="40" y="468" width="390" height="80" rx="6" fill="#fbfaf7" stroke="#0f172a" stroke-width="1.5" />
    <text x="235" y="486" class="t" text-anchor="middle">12 other small files</text>
    <text x="235" y="504" class="t-sub" text-anchor="middle">label / transcript-events</text>
    <text x="235" y="518" class="t-sub" text-anchor="middle">model-overrides / send-policy</text>
    <text x="235" y="532" class="t-sub" text-anchor="middle">no rollout, no hooks</text>

    <rect x="470" y="320" width="410" height="240" rx="12" fill="#fbfaf7" stroke="#ea580c" stroke-width="2.5" />
    <text x="490" y="344" class="t" fill="#ea580c" font-weight="700">Hermes &#x00B7; multi-platform + 4 resets</text>
    <text x="490" y="362" class="t-sub">SessionContext + SessionResetPolicy</text>

    <rect x="490" y="376" width="180" height="80" rx="6" fill="#fbfaf7" stroke="#0f172a" stroke-width="1.5" />
    <text x="580" y="394" class="t" text-anchor="middle">SessionSource</text>
    <text x="580" y="410" class="t-sub" text-anchor="middle">platform / chat_id</text>
    <text x="580" y="424" class="t-sub" text-anchor="middle">user / chat_name</text>
    <text x="580" y="438" class="t-sub" text-anchor="middle">DM / group / channel / thread</text>
    <text x="580" y="452" class="t-sub" text-anchor="middle">6+ platforms</text>

    <rect x="690" y="376" width="180" height="80" rx="6" fill="#fbfaf7" stroke="#b91c1c" stroke-width="2" />
    <text x="780" y="394" class="t" text-anchor="middle" fill="#b91c1c" font-weight="700">ResetPolicy</text>
    <text x="780" y="410" class="t-sub" text-anchor="middle">daily / idle</text>
    <text x="780" y="424" class="t-sub" text-anchor="middle">both / none</text>
    <text x="780" y="438" class="t-sub" text-anchor="middle">at_hour=4</text>
    <text x="780" y="452" class="t-sub" text-anchor="middle">idle_minutes=1440</text>

    <rect x="490" y="468" width="380" height="80" rx="6" fill="#fbfaf7" stroke="#0f172a" stroke-width="1.5" />
    <text x="680" y="486" class="t" text-anchor="middle">PII redaction by platform</text>
    <text x="680" y="504" class="t-sub" text-anchor="middle">whatsapp / signal / telegram / bluebubbles</text>
    <text x="680" y="518" class="t-sub" text-anchor="middle">discord excluded (mentions need original id)</text>
    <text x="680" y="532" class="t-sub" text-anchor="middle">notify_exclude_platforms</text>
  </g>
</svg>
