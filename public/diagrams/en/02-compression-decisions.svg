<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img"
     aria-label="Four core decisions for context compression">
  <defs>
    <filter id="wb02"><feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="221" /><feDisplacementMap in="SourceGraphic" scale="1.5" /></filter>
    <marker id="ar02" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0f172a" /></marker>
    <style>
      .h    { font: 600 14px sans-serif; fill: #0f172a; }
      .col  { font: 700 13px sans-serif; fill: #0f172a; }
      .lbl  { font: 700 12px sans-serif; fill: #0f172a; }
      .t    { font: 12px sans-serif; fill: #334155; }
      .t-s  { font: 12px sans-serif; fill: #334155; }
      .note { font: italic 10.5px sans-serif; fill: #92400e; }
      .num  { font: 700 12.5px sans-serif; fill: #fff; }
    </style>
  </defs>
  <text x="360" y="26" class="h" text-anchor="middle">Four core decisions for context compression</text>
  <text x="360" y="44" class="t-s" text-anchor="middle">Every agent must answer these four questions; different answers = different systems</text>

  <g filter="url(#wb02)">
    <rect x="60" y="70"  width="600" height="60" rx="10" fill="#fef3c7" stroke="#0f172a" stroke-width="1.6" />
    <circle cx="92" cy="100" r="16" fill="#0f172a" />
    <text x="92" y="105" class="num" text-anchor="middle">1</text>
    <text x="120" y="93" class="lbl">When to compress?</text>
    <text x="120" y="112" class="t">passive (retry after OOM) vs proactive (trigger at threshold)</text>
    <text x="120" y="125" class="t-s">cost: too early wastes work, too late crashes</text>

    <rect x="60" y="140" width="600" height="60" rx="10" fill="#bfdbfe" stroke="#0f172a" stroke-width="1.6" />
    <circle cx="92" cy="170" r="16" fill="#0f172a" />
    <text x="92" y="175" class="num" text-anchor="middle">2</text>
    <text x="120" y="163" class="lbl">What to compress?</text>
    <text x="120" y="182" class="t">oldest messages / tool results / middle history / multi-strategy chain</text>
    <text x="120" y="195" class="t-s">protect key evidence vs keep long-runs going</text>

    <rect x="60" y="210" width="600" height="60" rx="10" fill="#dcfce7" stroke="#0f172a" stroke-width="1.6" />
    <circle cx="92" cy="240" r="16" fill="#0f172a" />
    <text x="92" y="245" class="num" text-anchor="middle">3</text>
    <text x="120" y="233" class="lbl">How to compress?</text>
    <text x="120" y="252" class="t">drop / fold / summarise (auxiliary model) / file-based archive</text>
    <text x="120" y="265" class="t-s">more complex = more expensive; simpler = more context loss</text>

    <rect x="60" y="280" width="600" height="60" rx="10" fill="#fed7aa" stroke="#0f172a" stroke-width="1.6" />
    <circle cx="92" cy="310" r="16" fill="#0f172a" />
    <text x="92" y="315" class="num" text-anchor="middle">4</text>
    <text x="120" y="303" class="lbl">Is the compressed content still in context?</text>
    <text x="120" y="322" class="t">replace all / replace middle keep ends / persist to JSONL</text>
    <text x="120" y="335" class="t-s">decides whether you can audit / cross-session replay later</text>
  </g>
</svg>
