<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 480" role="img"
     aria-label="Four self-improvement systems plotted across learning timing vs who writes">
  <defs>
    <filter id="wb19"><feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="191" /><feDisplacementMap in="SourceGraphic" scale="2" /></filter>
    <marker id="ar19" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0f172a" /></marker>
    <style>
      .h    { font: 600 14px sans-serif; fill: #0f172a; }
      .ax   { font: 600 12.5px sans-serif; fill: #0f172a; }
      .t    { font: 12px sans-serif; fill: #334155; }
      .t-s  { font: 12px sans-serif; fill: #64748b; }
      .pin  { font: 700 12.5px sans-serif; fill: #fff; }
      .note { font: italic 10.5px sans-serif; fill: #334155; }
    </style>
  </defs>

  <text x="390" y="26" class="h" text-anchor="middle">Self-improvement: learning timing &#x00D7; who writes</text>
  <text x="390" y="44" class="t-s" text-anchor="middle">Right = outside the turn; up = more automated. Pick by who decides.</text>

  <g filter="url(#wb19)">
    <rect x="100" y="80" width="280" height="160" fill="#fef3c7" opacity="0.4" />
    <rect x="380" y="80" width="280" height="160" fill="#dcfce7" opacity="0.4" />
    <rect x="100" y="240" width="280" height="160" fill="#dbeafe" opacity="0.4" />
    <rect x="380" y="240" width="280" height="160" fill="#fee2e2" opacity="0.4" />

    <text x="120" y="100" class="t-s">in-turn &#x00B7; automatic</text>
    <text x="640" y="100" class="t-s" text-anchor="end">out-of-turn &#x00B7; automatic</text>
    <text x="110" y="394" class="t-s">in-turn &#x00B7; user-driven</text>
    <text x="650" y="394" class="t-s" text-anchor="end">out-of-turn &#x00B7; user-driven</text>

    <line x1="100" y1="400" x2="660" y2="400" stroke="#0f172a" stroke-width="2.5" marker-end="url(#ar19)" />
    <line x1="100" y1="400" x2="100" y2="70" stroke="#0f172a" stroke-width="2.5" marker-end="url(#ar19)" />
    <line x1="380" y1="80" x2="380" y2="400" stroke="#0f172a" stroke-width="1" stroke-dasharray="3 3" />
    <line x1="100" y1="240" x2="660" y2="240" stroke="#0f172a" stroke-width="1" stroke-dasharray="3 3" />

    <text x="660" y="420" class="ax" text-anchor="end">learning timing: out-of-turn &#x2192;</text>
    <text x="110" y="68" class="ax">&#x2191; degree of automation</text>

    <circle cx="200" cy="170" r="14" fill="#15803d" stroke="#0f172a" stroke-width="2" />
    <text x="200" y="174" class="pin" text-anchor="middle">OC</text>
    <text x="200" y="201" class="t" text-anchor="middle">OpenClaw</text>
    <text x="200" y="216" class="t-s" text-anchor="middle">passive indexing + decay</text>
    <text x="200" y="229" class="t-s" text-anchor="middle">"learn" = "look up"</text>

    <circle cx="240" cy="280" r="14" fill="#ea580c" stroke="#0f172a" stroke-width="2" />
    <text x="240" y="284" class="pin" text-anchor="middle">HM</text>
    <text x="240" y="311" class="t" text-anchor="middle">Hermes</text>
    <text x="240" y="326" class="t-s" text-anchor="middle">in-turn writes by the agent</text>
    <text x="240" y="339" class="t-s" text-anchor="middle">+ 11 threat scans</text>

    <circle cx="540" cy="130" r="14" fill="#1d4ed8" stroke="#0f172a" stroke-width="2" />
    <text x="540" y="134" class="pin" text-anchor="middle">CX</text>
    <text x="540" y="161" class="t" text-anchor="middle">Codex</text>
    <text x="540" y="176" class="t-s" text-anchor="middle">Phase 1 + Phase 2</text>
    <text x="540" y="189" class="t-s" text-anchor="middle">800-line LLM job</text>

    <circle cx="540" cy="320" r="14" fill="#6d28d9" stroke="#0f172a" stroke-width="2" />
    <text x="540" y="324" class="pin" text-anchor="middle">CC</text>
    <text x="540" y="351" class="t" text-anchor="middle">Claude Code</text>
    <text x="540" y="366" class="t-s" text-anchor="middle">skillify + /insights</text>
    <text x="540" y="379" class="t-s" text-anchor="middle">user-triggered explicitly</text>
  </g>

  <text x="20" y="465" class="t-s">CX = Codex &#x00B7; CC = Claude Code &#x00B7; OC = OpenClaw &#x00B7; HM = Hermes</text>
</svg>
