<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 480" role="img"
     aria-label="Four context systems plotted across assembly flexibility and cache hit rate">
  <defs>
    <filter id="wb03"><feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="5" /><feDisplacementMap in="SourceGraphic" scale="2" /></filter>
    <marker id="ar03" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0f172a" /></marker>
    <style>
      .h    { font: 600 14px sans-serif; fill: #0f172a; }
      .ax   { font: 600 12.5px sans-serif; fill: #0f172a; }
      .t    { font: 12px sans-serif; fill: #334155; }
      .t-s  { font: 12px sans-serif; fill: #64748b; }
      .pin  { font: 700 12.5px sans-serif; fill: #fff; }
      .note { font: italic 10.5px sans-serif; fill: #334155; }
    </style>
  </defs>

  <text x="390" y="26" class="h" text-anchor="middle">Context System: assembly flexibility &#x00D7; cache hit rate</text>
  <text x="390" y="44" class="t-s" text-anchor="middle">Cache-friendliness and dynamic assembly are naturally opposed. Claude Code splits with a magic string; Hermes simply gives up on cache.</text>

  <g filter="url(#wb03)">
    <rect x="100" y="80" width="280" height="160" fill="#dcfce7" opacity="0.4" />
    <rect x="380" y="80" width="280" height="160" fill="#fef3c7" opacity="0.4" />
    <rect x="100" y="240" width="280" height="160" fill="#fee2e2" opacity="0.4" />
    <rect x="380" y="240" width="280" height="160" fill="#dbeafe" opacity="0.4" />

    <text x="120" y="100" class="t-s">rigid + high cache hit</text>
    <text x="640" y="100" class="t-s" text-anchor="end">flexible + high hit &#x00B7; holy grail</text>
    <text x="110" y="394" class="t-s">rigid + low hit (worst)</text>
    <text x="400" y="260" class="t-s">flexible + low hit</text>

    <line x1="100" y1="400" x2="660" y2="400" stroke="#0f172a" stroke-width="2.5" marker-end="url(#ar03)" />
    <line x1="100" y1="400" x2="100" y2="70" stroke="#0f172a" stroke-width="2.5" marker-end="url(#ar03)" />
    <line x1="380" y1="80" x2="380" y2="400" stroke="#0f172a" stroke-width="1" stroke-dasharray="3 3" />
    <line x1="100" y1="240" x2="660" y2="240" stroke="#0f172a" stroke-width="1" stroke-dasharray="3 3" />

    <text x="660" y="420" class="ax" text-anchor="end">assembly flexibility (how much can be assembled at runtime) &#x2192;</text>
    <text x="110" y="68" class="ax">&#x2191; cache hit rate (one prompt runs many times)</text>

    <circle cx="310" cy="125" r="15" fill="#6d28d9" stroke="#0f172a" stroke-width="2" />
    <text x="310" y="129" class="pin" text-anchor="middle">CC</text>
    <text x="310" y="158" class="t" text-anchor="middle">Claude Code</text>
    <text x="310" y="173" class="t-s" text-anchor="middle">explicit DYNAMIC_BOUNDARY</text>
    <text x="310" y="186" class="t-s" text-anchor="middle">5 priorities &#x00B7; max cache</text>

    <circle cx="250" cy="200" r="15" fill="#1d4ed8" stroke="#0f172a" stroke-width="2" />
    <text x="250" y="204" class="pin" text-anchor="middle">CX</text>
    <text x="250" y="232" class="t" text-anchor="middle">Codex</text>
    <text x="250" y="247" class="t-s" text-anchor="middle">24 fragments &#x00B7; markers</text>
    <text x="250" y="260" class="t-s" text-anchor="middle">compressible, diffable</text>

    <circle cx="460" cy="240" r="15" fill="#15803d" stroke="#0f172a" stroke-width="2" />
    <text x="460" y="244" class="pin" text-anchor="middle">OC</text>
    <text x="460" y="272" class="t" text-anchor="middle">OpenClaw</text>
    <text x="460" y="287" class="t-s" text-anchor="middle">buildXxxSection + 3 modes</text>
    <text x="460" y="300" class="t-s" text-anchor="middle">main/sub prompt mixable</text>

    <circle cx="580" cy="335" r="15" fill="#ea580c" stroke="#0f172a" stroke-width="2" />
    <text x="580" y="339" class="pin" text-anchor="middle">HM</text>
    <text x="580" y="368" class="t" text-anchor="middle">Hermes</text>
    <text x="580" y="383" class="t-s" text-anchor="middle">10 layers + skip_* flags</text>
    <text x="580" y="396" class="t-s" text-anchor="middle">SOUL.md tunes personality &#x00B7; drops cache</text>

    <text x="530" y="125" class="note" text-anchor="middle">Upper-right is empty</text>
    <text x="530" y="142" class="note" text-anchor="middle">cache and dynamism conflict</text>
  </g>

  <text x="20" y="465" class="t-s">CX = Codex &#x00B7; CC = Claude Code &#x00B7; OC = OpenClaw &#x00B7; HM = Hermes</text>
</svg>
