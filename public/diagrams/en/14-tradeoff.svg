<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 480" role="img"
     aria-label="Four multi-channel entry strategies plotted across channel count and ecosystem openness">
  <defs>
    <filter id="wb14"><feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="141" /><feDisplacementMap in="SourceGraphic" scale="2" /></filter>
    <marker id="ar14" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0f172a" /></marker>
    <style>
      .h    { font: 600 14px sans-serif; fill: #0f172a; }
      .ax   { font: 600 12.5px sans-serif; fill: #0f172a; }
      .t    { font: 12px sans-serif; fill: #334155; }
      .t-s  { font: 12px sans-serif; fill: #64748b; }
      .pin  { font: 700 12.5px sans-serif; fill: #fff; }
      .note { font: italic 10.5px sans-serif; fill: #334155; }
    </style>
  </defs>

  <text x="390" y="26" class="h" text-anchor="middle">Multi-channel entry: channel count &#x00D7; ecosystem openness</text>
  <text x="390" y="44" class="t-s" text-anchor="middle">Right = more channels; up = easier for third parties to add channels. Pick by agent shape.</text>

  <g filter="url(#wb14)">
    <rect x="100" y="80" width="280" height="160" fill="#fef3c7" opacity="0.4" />
    <rect x="380" y="80" width="280" height="160" fill="#dcfce7" opacity="0.4" />
    <rect x="100" y="240" width="280" height="160" fill="#dbeafe" opacity="0.4" />
    <rect x="380" y="240" width="280" height="160" fill="#fee2e2" opacity="0.4" />

    <text x="120" y="100" class="t-s">few channels &#x00B7; open</text>
    <text x="640" y="100" class="t-s" text-anchor="end">many channels &#x00B7; open</text>
    <text x="110" y="394" class="t-s">few channels &#x00B7; closed</text>
    <text x="650" y="394" class="t-s" text-anchor="end">many channels &#x00B7; closed</text>

    <line x1="100" y1="400" x2="660" y2="400" stroke="#0f172a" stroke-width="2.5" marker-end="url(#ar14)" />
    <line x1="100" y1="400" x2="100" y2="70" stroke="#0f172a" stroke-width="2.5" marker-end="url(#ar14)" />
    <line x1="380" y1="80" x2="380" y2="400" stroke="#0f172a" stroke-width="1" stroke-dasharray="3 3" />
    <line x1="100" y1="240" x2="660" y2="240" stroke="#0f172a" stroke-width="1" stroke-dasharray="3 3" />

    <text x="660" y="420" class="ax" text-anchor="end">channel count &#x2192;</text>
    <text x="110" y="68" class="ax">&#x2191; ecosystem openness (low friction for third-party channels = high)</text>

    <circle cx="220" cy="290" r="14" fill="#6d28d9" stroke="#0f172a" stroke-width="2" />
    <text x="220" y="294" class="pin" text-anchor="middle">CC</text>
    <text x="220" y="321" class="t" text-anchor="middle">Claude Code</text>
    <text x="220" y="336" class="t-s" text-anchor="middle">one binary + 8 subcommands</text>
    <text x="220" y="349" class="t-s" text-anchor="middle">commander.js</text>

    <circle cx="430" cy="280" r="14" fill="#1d4ed8" stroke="#0f172a" stroke-width="2" />
    <text x="430" y="284" class="pin" text-anchor="middle">CX</text>
    <text x="430" y="311" class="t" text-anchor="middle">Codex</text>
    <text x="430" y="326" class="t-s" text-anchor="middle">multi-binary</text>
    <text x="430" y="339" class="t-s" text-anchor="middle">tui/exec/mcp/app-server</text>

    <circle cx="500" cy="130" r="14" fill="#15803d" stroke="#0f172a" stroke-width="2" />
    <text x="500" y="134" class="pin" text-anchor="middle">OC</text>
    <text x="500" y="161" class="t" text-anchor="middle">OpenClaw</text>
    <text x="500" y="176" class="t-s" text-anchor="middle">19 sub-CLIs + plugins</text>
    <text x="500" y="189" class="t-s" text-anchor="middle">ACP + channels-plugins</text>

    <circle cx="620" cy="270" r="14" fill="#ea580c" stroke="#0f172a" stroke-width="2" />
    <text x="620" y="274" class="pin" text-anchor="middle">HM</text>
    <text x="620" y="301" class="t" text-anchor="middle">Hermes</text>
    <text x="620" y="316" class="t-s" text-anchor="middle">17 platform adapters</text>
    <text x="620" y="329" class="t-s" text-anchor="middle">bundled in main repo</text>
  </g>

  <text x="20" y="465" class="t-s">CX = Codex &#x00B7; CC = Claude Code &#x00B7; OC = OpenClaw &#x00B7; HM = Hermes</text>
</svg>
