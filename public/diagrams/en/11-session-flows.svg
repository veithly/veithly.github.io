<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" role="img"
     aria-label="Four session-model flows side by side">
  <defs>
    <filter id="wb11F"><feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="103" /><feDisplacementMap in="SourceGraphic" scale="1.5" /></filter>
    <marker id="ar11F" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0f172a" /></marker>
    <style>
      .h    { font: 600 14px sans-serif; fill: #0f172a; }
      .col  { font: 700 13px sans-serif; fill: #0f172a; }
      .lbl  { font: 700 12px sans-serif; fill: #0f172a; }
      .t-s  { font: 12px sans-serif; fill: #334155; }
      .note { font: italic 10.5px sans-serif; fill: #92400e; }
    </style>
  </defs>

  <text x="440" y="24" class="h" text-anchor="middle">Four session-model flows side by side</text>
  <text x="440" y="42" class="t-s" text-anchor="middle">JSONL persistence (Codex) &#x00B7; multi-hook IDE (Claude Code) &#x00B7; minimal id (OpenClaw) &#x00B7; multi-platform router (Hermes)</text>

  <g filter="url(#wb11F)">
    <text x="120" y="70" class="col" text-anchor="middle">Codex &#x00B7; JSONL + SQLite</text>
    <rect x="40" y="80" width="160" height="36" rx="8" fill="#fef3c7" stroke="#0f172a" stroke-width="1.6" />
    <text x="120" y="103" class="lbl" text-anchor="middle">create session</text>

    <line x1="120" y1="116" x2="120" y2="135" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar11F)" />

    <rect x="40" y="138" width="160" height="48" rx="8" fill="#bfdbfe" stroke="#0f172a" stroke-width="1.6" />
    <text x="120" y="158" class="lbl" text-anchor="middle">rollout-{ts}-{uuid}.jsonl</text>
    <text x="120" y="174" class="t-s" text-anchor="middle">line 1: SessionMeta</text>

    <line x1="120" y1="186" x2="120" y2="205" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar11F)" />

    <rect x="40" y="208" width="160" height="60" rx="8" fill="#dcfce7" stroke="#0f172a" stroke-width="1.6" />
    <text x="120" y="228" class="lbl" text-anchor="middle">append every turn</text>
    <text x="120" y="244" class="t-s" text-anchor="middle">ResponseItem &#x00B7; EventMsg</text>
    <text x="120" y="258" class="t-s" text-anchor="middle">Compacted &#x00B7; TurnContext</text>

    <line x1="120" y1="268" x2="120" y2="287" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar11F)" />

    <rect x="40" y="290" width="160" height="48" rx="8" fill="#fed7aa" stroke="#0f172a" stroke-width="1.6" />
    <text x="120" y="310" class="lbl" text-anchor="middle">state.db index</text>
    <text x="120" y="326" class="t-s" text-anchor="middle">fast thread list lookup</text>

    <line x1="120" y1="338" x2="120" y2="357" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar11F)" />

    <rect x="40" y="360" width="160" height="48" rx="8" fill="#e2e8f0" stroke="#0f172a" stroke-width="1.6" />
    <text x="120" y="380" class="lbl" text-anchor="middle">resume</text>
    <text x="120" y="396" class="t-s" text-anchor="middle">SessionMeta &#x2192; metadata</text>

    <text x="120" y="430" class="note" text-anchor="middle">append-only JSONL</text>
    <text x="120" y="445" class="note" text-anchor="middle">recoverable even after crash</text>

    <text x="330" y="70" class="col" text-anchor="middle">Claude Code &#x00B7; 4 hooks + 22 tools</text>
    <rect x="250" y="80" width="160" height="36" rx="8" fill="#fef3c7" stroke="#0f172a" stroke-width="1.6" />
    <text x="330" y="103" class="lbl" text-anchor="middle">source: startup/resume/...</text>

    <line x1="330" y1="116" x2="330" y2="135" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar11F)" />

    <rect x="250" y="138" width="160" height="48" rx="8" fill="#bfdbfe" stroke="#0f172a" stroke-width="1.6" />
    <text x="330" y="158" class="lbl" text-anchor="middle">loadPluginHooks</text>
    <text x="330" y="174" class="t-s" text-anchor="middle">skip when managed-only</text>

    <line x1="330" y1="186" x2="330" y2="205" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar11F)" />

    <rect x="250" y="208" width="160" height="48" rx="8" fill="#dcfce7" stroke="#0f172a" stroke-width="1.6" />
    <text x="330" y="228" class="lbl" text-anchor="middle">processSessionStartHooks</text>
    <text x="330" y="244" class="t-s" text-anchor="middle">inject CLAUDE.md context</text>

    <line x1="330" y1="256" x2="330" y2="275" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar11F)" />

    <rect x="250" y="278" width="160" height="72" rx="8" fill="#fed7aa" stroke="#0f172a" stroke-width="1.6" />
    <text x="330" y="298" class="lbl" text-anchor="middle">sessionRestore</text>
    <text x="330" y="314" class="t-s" text-anchor="middle">cost / attribution / files</text>
    <text x="330" y="328" class="t-s" text-anchor="middle">todos / model / worktree</text>
    <text x="330" y="342" class="t-s" text-anchor="middle">+ systemPrompt</text>

    <line x1="330" y1="350" x2="330" y2="369" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar11F)" />

    <rect x="250" y="372" width="160" height="36" rx="8" fill="#e2e8f0" stroke="#0f172a" stroke-width="1.6" />
    <text x="330" y="395" class="lbl" text-anchor="middle">main chat starts</text>

    <text x="330" y="430" class="note" text-anchor="middle">rule: no warmup work</text>
    <text x="330" y="445" class="note" text-anchor="middle">extra work on startup path tends to drift</text>

    <text x="540" y="70" class="col" text-anchor="middle">OpenClaw &#x00B7; minimal id</text>
    <rect x="460" y="80" width="160" height="36" rx="8" fill="#fef3c7" stroke="#0f172a" stroke-width="1.6" />
    <text x="540" y="103" class="lbl" text-anchor="middle">user sends message</text>

    <line x1="540" y1="116" x2="540" y2="135" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar11F)" />

    <rect x="460" y="138" width="160" height="48" rx="8" fill="#bfdbfe" stroke="#0f172a" stroke-width="1.6" />
    <text x="540" y="158" class="lbl" text-anchor="middle">SESSION_ID_RE check</text>
    <text x="540" y="174" class="t-s" text-anchor="middle">one-line UUID regex</text>

    <line x1="540" y1="186" x2="540" y2="205" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar11F)" />

    <rect x="460" y="208" width="160" height="48" rx="8" fill="#dcfce7" stroke="#0f172a" stroke-width="1.6" />
    <text x="540" y="228" class="lbl" text-anchor="middle">session-key join</text>
    <text x="540" y="244" class="t-s" text-anchor="middle">{agentId}:{sessionId}</text>

    <line x1="540" y1="256" x2="540" y2="275" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar11F)" />

    <rect x="460" y="278" width="160" height="48" rx="8" fill="#fed7aa" stroke="#0f172a" stroke-width="1.6" />
    <text x="540" y="298" class="lbl" text-anchor="middle">serialise transcript events</text>
    <text x="540" y="314" class="t-s" text-anchor="middle">storage left to upper layer</text>

    <line x1="540" y1="326" x2="540" y2="345" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar11F)" />

    <rect x="460" y="348" width="160" height="36" rx="8" fill="#e2e8f0" stroke="#0f172a" stroke-width="1.6" />
    <text x="540" y="371" class="lbl" text-anchor="middle">router dispatches to agent</text>

    <text x="540" y="410" class="note" text-anchor="middle">12 files vs Claude Code's 22 tools</text>
    <text x="540" y="425" class="note" text-anchor="middle">thinnest fit for platform-style agents</text>

    <text x="760" y="70" class="col" text-anchor="middle">Hermes &#x00B7; multi-platform + reset</text>
    <rect x="680" y="80" width="160" height="36" rx="8" fill="#fef3c7" stroke="#0f172a" stroke-width="1.6" />
    <text x="760" y="103" class="lbl" text-anchor="middle">Slack/TG/Discord message</text>

    <line x1="760" y1="116" x2="760" y2="135" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar11F)" />

    <rect x="680" y="138" width="160" height="60" rx="8" fill="#bfdbfe" stroke="#0f172a" stroke-width="1.6" />
    <text x="760" y="158" class="lbl" text-anchor="middle">SessionSource</text>
    <text x="760" y="174" class="t-s" text-anchor="middle">platform + chat_id</text>
    <text x="760" y="188" class="t-s" text-anchor="middle">+ user / chat metadata</text>

    <line x1="760" y1="198" x2="760" y2="217" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar11F)" />

    <rect x="680" y="220" width="160" height="60" rx="8" fill="#dcfce7" stroke="#0f172a" stroke-width="1.6" />
    <text x="760" y="240" class="lbl" text-anchor="middle">SessionResetPolicy</text>
    <text x="760" y="256" class="t-s" text-anchor="middle">daily / idle / both / none</text>
    <text x="760" y="270" class="t-s" text-anchor="middle">at_hour=4 &#x00B7; idle=1440min</text>

    <line x1="760" y1="280" x2="760" y2="299" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar11F)" />

    <rect x="680" y="302" width="160" height="60" rx="8" fill="#fed7aa" stroke="#0f172a" stroke-width="1.6" />
    <text x="760" y="322" class="lbl" text-anchor="middle">build_session_context</text>
    <text x="760" y="338" class="t-s" text-anchor="middle">inject system prompt</text>
    <text x="760" y="352" class="t-s" text-anchor="middle">PII redact for safe platforms</text>

    <line x1="760" y1="362" x2="760" y2="381" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar11F)" />

    <rect x="680" y="384" width="160" height="36" rx="8" fill="#e2e8f0" stroke="#0f172a" stroke-width="1.6" />
    <text x="760" y="407" class="lbl" text-anchor="middle">home_channels routing</text>

    <text x="760" y="440" class="note" text-anchor="middle">6+ platforms &#x00B7; cross-platform reset</text>
    <text x="760" y="455" class="note" text-anchor="middle">cron output &#x2192; home channel</text>
  </g>

  <text x="440" y="495" class="t-s" text-anchor="middle">Left-to-right: file-level persistence &#x2192; subsystem layering &#x2192; minimal id &#x2192; multi-platform routing. Each fits a different product shape.</text>

  <g>
    <rect x="40" y="510" width="800" height="80" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
    <text x="60" y="530" class="lbl">Shared invariants:</text>
    <text x="60" y="548" class="t-s">&#x00B7; session_id always UUID or timestamp+UUID to avoid collisions</text>
    <text x="60" y="564" class="t-s">&#x00B7; session bound to user / scope (agent_path / worktree / agentId / platform:chat_id)</text>
    <text x="60" y="580" class="t-s">&#x00B7; resume must restore metadata (cwd / model / approval mode), not just replay messages</text>
  </g>
</svg>
