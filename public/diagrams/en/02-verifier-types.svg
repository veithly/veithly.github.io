<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" role="img"
     aria-label="Three verifier types">
  <defs>
    <filter id="wb02"><feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="221" /><feDisplacementMap in="SourceGraphic" scale="1.5" /></filter>
    <marker id="ar02" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0f172a" /></marker>
    <style>
      .h    { font: 600 14px sans-serif; fill: #0f172a; }
      .col  { font: 700 13px sans-serif; fill: #0f172a; }
      .lbl  { font: 700 12px sans-serif; fill: #0f172a; }
      .t    { font: 12px sans-serif; fill: #334155; }
      .t-s  { font: 12px sans-serif; fill: #334155; }
      .note { font: italic 10.5px sans-serif; fill: #92400e; }
      .num  { font: 700 12.5px sans-serif; fill: #fff; }
    </style>
  </defs>
  <text x="380" y="26" class="h" text-anchor="middle">Three types of verifier</text>
  <text x="380" y="44" class="t-s" text-anchor="middle">Stop too early = task not done; stop too late = burn tokens / endless loop</text>

  <g filter="url(#wb02)">
    <rect x="60" y="70" width="640" height="80" rx="10" fill="#dcfce7" stroke="#0f172a" stroke-width="1.6" />
    <text x="90" y="93" class="lbl">hard verifier</text>
    <text x="90" y="111" class="t">external rule / tool execution result decides</text>
    <text x="90" y="128" class="t-s">run tests / lint / exit_code &#x00B7; fail = must continue</text>
    <text x="90" y="143" class="note">Codex uses this most (apply_patch + run tests + execpolicy)</text>

    <rect x="60" y="158" width="640" height="80" rx="10" fill="#fef3c7" stroke="#0f172a" stroke-width="1.6" />
    <text x="90" y="181" class="lbl">soft verifier</text>
    <text x="90" y="199" class="t">internal state / budget / heuristic judgement</text>
    <text x="90" y="216" class="t-s">token budget / convergence rate / retry count &#x00B7; triggered = soft-stop or nudge</text>
    <text x="90" y="231" class="note">Claude Code: 90% threshold + 3 turns &lt; 500 token diminishing returns</text>

    <rect x="60" y="246" width="640" height="80" rx="10" fill="#fee2e2" stroke="#0f172a" stroke-width="1.6" />
    <text x="90" y="269" class="lbl">lazy verifier</text>
    <text x="90" y="287" class="t">model decides to stop on its own</text>
    <text x="90" y="304" class="t-s">finish_reason / no tool_use &#x00B7; trust depends entirely on the model</text>
    <text x="90" y="319" class="note">Fallback  all systems have it, but unreliable on its own</text>
  </g>

  <text x="380" y="355" class="t-s" text-anchor="middle">Production needs at least hard + soft two layers; lazy as fallback</text>
</svg>
