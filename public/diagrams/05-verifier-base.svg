<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 540" role="img"
     aria-label="Verifier 三层决策流">
  <defs>
    
    <filter id="wobble">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" />
      <feDisplacementMap in="SourceGraphic" scale="2" />
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f172a" />
    </marker>

    <style>
    .h     { font: 600 14px sans-serif; fill: #0f172a; }
    .t     { font: 12px sans-serif; fill: #0f172a; }
    .t-sub { font: 12px sans-serif; fill: #334155; }
    .sys   { font: 700 13px sans-serif; fill: #fbfaf7; }
    .stage { font: 600 12px sans-serif; fill: #0f172a; }
    .num   { font: 700 16px sans-serif; fill: #ea580c; }
</style>
  </defs>

  <text x="20" y="30" class="h">Verifier 三层决策流</text>
  <text x="20" y="50" class="t-sub">从上到下：外部产物 → 内部预算 → 模型自评</text>

  <g filter="url(#wobble)">
    <!-- input -->
    <rect x="240" y="80" width="220" height="36" rx="6"
          fill="#0f172a" stroke="#0f172a" stroke-width="2" />
    <text x="350" y="103" class="sys" text-anchor="middle">Turn N 输出</text>
    <line x1="350" y1="116" x2="350" y2="146" stroke="#0f172a" stroke-width="2" marker-end="url(#arrow)" />

    <!-- tier 1: hard -->
    <rect x="60" y="150" width="580" height="100" rx="10"
          fill="#fbfaf7" stroke="#b91c1c" stroke-width="2.5" />
    <text x="80" y="178" class="t" fill="#b91c1c" font-weight="700">1 · 硬 verifier</text>
    <text x="80" y="200" class="t">apply_patch 合法? · tests 退出码 0? · lint pass? · execpolicy Allow?</text>
    <text x="80" y="220" class="t-sub">fail → 强制继续 loop (不给模型选择退出的机会)</text>
    <text x="80" y="237" class="t-sub">pass → 进下一层</text>
    <line x1="350" y1="250" x2="350" y2="276" stroke="#0f172a" stroke-width="2" marker-end="url(#arrow)" />

    <!-- tier 2: soft -->
    <rect x="60" y="280" width="580" height="100" rx="10"
          fill="#fbfaf7" stroke="#ea580c" stroke-width="2.5" />
    <text x="80" y="308" class="t" fill="#ea580c" font-weight="700">2 · 软 verifier</text>
    <text x="80" y="330" class="t">token 用量 &lt; 90%? · 重试 &lt; 上限? · 连 3 轮增量 &gt; 500 token?</text>
    <text x="80" y="350" class="t-sub">超限 → 强制停 / nudge (diminishing returns)</text>
    <text x="80" y="367" class="t-sub">正常 → 进下一层</text>
    <line x1="350" y1="380" x2="350" y2="406" stroke="#0f172a" stroke-width="2" marker-end="url(#arrow)" />

    <!-- tier 3: lazy -->
    <rect x="60" y="410" width="580" height="100" rx="10"
          fill="#fbfaf7" stroke="#15803d" stroke-width="2.5" />
    <text x="80" y="438" class="t" fill="#15803d" font-weight="700">3 · 放任型 verifier</text>
    <text x="80" y="460" class="t">finish_reason == "stop"? · 流里没 tool_use block?</text>
    <text x="80" y="480" class="t-sub">信不信全凭模型自觉；不能让 loop 只靠这一层</text>
    <text x="80" y="497" class="t-sub">pass → loop 退出</text>
  </g>
</svg>
