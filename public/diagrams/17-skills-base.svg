  <rect width="900" height="600" fill="#fbfaf7" />

  <text x="450" y="34" class="head" text-anchor="middle">Skill 系统：从 metadata schema 到完整 supply chain</text>
  <text x="450" y="54" class="t-sub" text-anchor="middle">8 crate + scope/policy · 17 bundled + skillify · scanner + install · 4 trust x 3 verdict</text>

  <g filter="url(#r17)">
    <rect x="20" y="68" width="430" height="250" rx="12" fill="#fbfaf7" stroke="#1d4ed8" stroke-width="2.5" />
