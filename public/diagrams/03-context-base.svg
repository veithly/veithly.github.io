<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 510" role="img"
     aria-label="Context 装载 7 件套">
  <defs>
    
    <filter id="wobble">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" />
      <feDisplacementMap in="SourceGraphic" scale="2" />
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f172a" />
    </marker>

    <style>
    .h     { font: 600 14px sans-serif; fill: #0f172a; }
    .t     { font: 12px sans-serif; fill: #0f172a; }
    .t-sub { font: 12px sans-serif; fill: #334155; }
    .sys   { font: 700 13px sans-serif; fill: #fbfaf7; }
    .stage { font: 600 12px sans-serif; fill: #0f172a; }
    .num   { font: 700 16px sans-serif; fill: #ea580c; }
</style>
  </defs>

  <text x="20" y="30" class="h">Context 装载 7 件套</text>
  <text x="20" y="50" class="t-sub">任何 agent 的调用 context 都是这几层拼出来的</text>

  <g filter="url(#wobble)">
    
    <rect x="80" y="80" width="540" height="42" rx="6"
          fill="#fbfaf7" stroke="#0f172a" stroke-width="2" />
    <text x="106" y="107" class="num" text-anchor="middle">1</text>
    <line x1="128" y1="88" x2="128" y2="114" stroke="#0f172a" stroke-width="1.5" />
    <text x="148" y="99" class="t">Identity</text>
    <text x="148" y="114" class="t-sub">你是谁</text>
    <rect x="80" y="132" width="540" height="42" rx="6"
          fill="#fbfaf7" stroke="#0f172a" stroke-width="2" />
    <text x="106" y="159" class="num" text-anchor="middle">2</text>
    <line x1="128" y1="140" x2="128" y2="166" stroke="#0f172a" stroke-width="1.5" />
    <text x="148" y="151" class="t">Tools</text>
    <text x="148" y="166" class="t-sub">你能干什么</text>
    <rect x="80" y="184" width="540" height="42" rx="6"
          fill="#fbfaf7" stroke="#0f172a" stroke-width="2" />
    <text x="106" y="211" class="num" text-anchor="middle">3</text>
    <line x1="128" y1="192" x2="128" y2="218" stroke="#0f172a" stroke-width="1.5" />
    <text x="148" y="203" class="t">Permissions</text>
    <text x="148" y="218" class="t-sub">你不能干什么</text>
    <rect x="80" y="236" width="540" height="42" rx="6"
          fill="#fbfaf7" stroke="#0f172a" stroke-width="2" />
    <text x="106" y="263" class="num" text-anchor="middle">4</text>
    <line x1="128" y1="244" x2="128" y2="270" stroke="#0f172a" stroke-width="1.5" />
    <text x="148" y="255" class="t">Memory</text>
    <text x="148" y="270" class="t-sub">之前发生过什么</text>
    <rect x="80" y="288" width="540" height="42" rx="6"
          fill="#fbfaf7" stroke="#0f172a" stroke-width="2" />
    <text x="106" y="315" class="num" text-anchor="middle">5</text>
    <line x1="128" y1="296" x2="128" y2="322" stroke="#0f172a" stroke-width="1.5" />
    <text x="148" y="307" class="t">Context files</text>
    <text x="148" y="322" class="t-sub">AGENTS.md / CLAUDE.md / .cursorrules</text>
    <rect x="80" y="340" width="540" height="42" rx="6"
          fill="#fbfaf7" stroke="#0f172a" stroke-width="2" />
    <text x="106" y="367" class="num" text-anchor="middle">6</text>
    <line x1="128" y1="348" x2="128" y2="374" stroke="#0f172a" stroke-width="1.5" />
    <text x="148" y="359" class="t">Env hints</text>
    <text x="148" y="374" class="t-sub">时间 / 平台 / cwd</text>
    <rect x="80" y="392" width="540" height="42" rx="6"
          fill="#fbfaf7" stroke="#0f172a" stroke-width="2" />
    <text x="106" y="419" class="num" text-anchor="middle">7</text>
    <line x1="128" y1="400" x2="128" y2="426" stroke="#0f172a" stroke-width="1.5" />
    <text x="148" y="411" class="t">Recent history</text>
    <text x="148" y="426" class="t-sub">近几个 turn</text>
  </g>

  <!-- right-side annotation: cache vs dynamic split -->
  <line x1="640" y1="80" x2="640" y2="240" stroke="#1d4ed8" stroke-width="2" />
  <text x="650" y="110" class="t-sub" fill="#1d4ed8">静态 / 可缓存</text>
  <text x="650" y="126" class="t-sub" fill="#1d4ed8">layer 1-3</text>

  <line x1="640" y1="240" x2="640" y2="486" stroke="#ea580c" stroke-width="2" />
  <text x="650" y="310" class="t-sub" fill="#ea580c">动态 / 每 turn 重建</text>
  <text x="650" y="326" class="t-sub" fill="#ea580c">layer 4-7</text>
</svg>
