<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" role="img" aria-label="Diagram placeholder">
  <defs>
    <filter id="wobble">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="1"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
  </defs>
  <g filter="url(#wobble)" fill="#fdf6e3" stroke="#1e293b" stroke-width="2">
    <rect x="20" y="20" width="560" height="260" rx="12"/>
  </g>
  <text x="300" y="140" font-family="system-ui, sans-serif" font-size="22" fill="#1e293b" text-anchor="middle">
    Diagram placeholder
  </text>
  <text x="300" y="172" font-family="system-ui, sans-serif" font-size="14" fill="#7c3aed" text-anchor="middle">
    Replace with .excalidraw export
  </text>
  <text x="300" y="200" font-family="system-ui, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle" opacity="0.6">
    docs-site/diagrams/*.excalidraw -&gt; public/diagrams/*.svg
  </text>
</svg>
