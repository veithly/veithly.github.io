<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 480" role="img"
     aria-label="四家 Verifier 在严格度 × 可扩展性 两条轴上的位置">
  <defs>
    <filter id="wb05"><feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="17" /><feDisplacementMap in="SourceGraphic" scale="2" /></filter>
    <marker id="ar05" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0f172a" /></marker>
    <style>
      .h    { font: 600 14px sans-serif; fill: #0f172a; }
      .ax   { font: 600 12.5px sans-serif; fill: #0f172a; }
      .t    { font: 12px sans-serif; fill: #334155; }
      .t-s  { font: 12px sans-serif; fill: #64748b; }
      .pin  { font: 700 12.5px sans-serif; fill: #fff; }
      .note { font: italic 10.5px sans-serif; fill: #334155; }
    </style>
  </defs>

  <text x="390" y="26" class="h" text-anchor="middle">Verifier：严格度 × 可扩展性</text>
  <text x="390" y="44" class="t-s" text-anchor="middle">硬 verifier 越多 loop 越被外部信任；可扩展性高就能让第三方挂自己的检查</text>

  <g filter="url(#wb05)">
    <rect x="100" y="80" width="280" height="160" fill="#fef3c7" opacity="0.4" />
    <rect x="380" y="80" width="280" height="160" fill="#dcfce7" opacity="0.4" />
    <rect x="100" y="240" width="280" height="160" fill="#fee2e2" opacity="0.4" />
    <rect x="380" y="240" width="280" height="160" fill="#dbeafe" opacity="0.4" />

    <text x="120" y="100" class="t-s">松 + 可扩展</text>
    <text x="640" y="100" class="t-s" text-anchor="end">严 + 可扩展 · 圣杯</text>
    <text x="110" y="394" class="t-s">松 + 不可扩展（最差）</text>
    <text x="650" y="394" class="t-s" text-anchor="end">严 + 不可扩展</text>

    <line x1="100" y1="400" x2="660" y2="400" stroke="#0f172a" stroke-width="2.5" marker-end="url(#ar05)" />
    <line x1="100" y1="400" x2="100" y2="70" stroke="#0f172a" stroke-width="2.5" marker-end="url(#ar05)" />
    <line x1="380" y1="80" x2="380" y2="400" stroke="#0f172a" stroke-width="1" stroke-dasharray="3 3" />
    <line x1="100" y1="240" x2="660" y2="240" stroke="#0f172a" stroke-width="1" stroke-dasharray="3 3" />

    <text x="660" y="420" class="ax" text-anchor="end">单 loop verifier 严格度（外部产物 → 放任型）→</text>
    <text x="110" y="68" class="ax">↑ 可扩展性（外部能挂多少 verifier）</text>

    <!-- OpenClaw: top-left -->
    <circle cx="240" cy="120" r="15" fill="#15803d" stroke="#0f172a" stroke-width="2" />
    <text x="240" y="124" class="pin" text-anchor="middle">OC</text>
    <text x="240" y="153" class="t" text-anchor="middle">OpenClaw</text>
    <text x="240" y="168" class="t-s" text-anchor="middle">中间件 + 4 种 detector</text>
    <text x="240" y="181" class="t-s" text-anchor="middle">可扩展性封顶</text>

    <!-- Codex: bottom-right (highest strictness, low extensibility) -->
    <circle cx="610" cy="285" r="15" fill="#1d4ed8" stroke="#0f172a" stroke-width="2" />
    <text x="610" y="289" class="pin" text-anchor="middle">CX</text>
    <text x="610" y="317" class="t" text-anchor="middle">Codex</text>
    <text x="610" y="332" class="t-s" text-anchor="middle">硬 verifier 4 件套</text>
    <text x="610" y="345" class="t-s" text-anchor="middle">execpolicy 三态 · 最严</text>

    <!-- Claude Code: middle-bottom -->
    <circle cx="450" cy="295" r="15" fill="#6d28d9" stroke="#0f172a" stroke-width="2" />
    <text x="450" y="299" class="pin" text-anchor="middle">CC</text>
    <text x="450" y="327" class="t" text-anchor="middle">Claude Code</text>
    <text x="450" y="342" class="t-s" text-anchor="middle">tokenBudget 0.9/500/3</text>
    <text x="450" y="355" class="t-s" text-anchor="middle">无 hard verifier hook</text>

    <!-- Hermes: bottom-left -->
    <circle cx="220" cy="290" r="15" fill="#ea580c" stroke="#0f172a" stroke-width="2" />
    <text x="220" y="294" class="pin" text-anchor="middle">HM</text>
    <text x="220" y="322" class="t" text-anchor="middle">Hermes</text>
    <text x="220" y="337" class="t-s" text-anchor="middle">IterationBudget + grace</text>
    <text x="220" y="350" class="t-s" text-anchor="middle">运行时几乎无硬 verifier</text>

    <text x="540" y="135" class="note" text-anchor="middle">右上角无人</text>
    <text x="540" y="152" class="note" text-anchor="middle">严格 + 高可插互相挤压</text>
  </g>

  <text x="20" y="465" class="t-s">CX = Codex · CC = Claude Code · OC = OpenClaw · HM = Hermes</text>
</svg>
